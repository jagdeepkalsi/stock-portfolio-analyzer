AWSTemplateFormatVersion: '2010-09-09'
Description: 'Portfolio Analyzer - AWS Lambda function with scheduled execution'

Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment package
    Default: portfolio-analyzer-deployment
  
  S3Key:
    Type: String
    Description: S3 key for the Lambda deployment package
    Default: lambda-deployment.zip
  
  EmailRecipient:
    Type: String
    Description: Email address to receive portfolio reports
    Default: your-email@example.com

Resources:
  # S3 Bucket for storing portfolio data
  PortfolioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-portfolio-data"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Secrets for API keys and email configuration
  ApiKeysSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: portfolio-analyzer/api-keys
      Description: API keys for portfolio analyzer
      SecretString: !Sub |
        {
          "alpha_vantage_api_key": "YOUR_ALPHA_VANTAGE_API_KEY_HERE",
          "finnhub_api_key": "YOUR_FINNHUB_API_KEY_HERE"
        }

  EmailConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: portfolio-analyzer/email-config
      Description: Email configuration for portfolio analyzer
      SecretString: !Sub |
        {
          "smtp_user": "your-email@gmail.com",
          "smtp_password": "your-app-password"
        }

  # IAM Role for Lambda function
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PortfolioAnalyzerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${PortfolioBucket}/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref ApiKeysSecret
                  - !Ref EmailConfigSecret
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"

  # Lambda function
  PortfolioAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: portfolio-analyzer
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      Timeout: 900  # 15 minutes
      MemorySize: 512
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref PortfolioBucket
      Description: 'Automated portfolio analysis and reporting'

  # CloudWatch Log Group
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${PortfolioAnalyzerFunction}"
      RetentionInDays: 30

  # EventBridge rule for daily execution at 2 PM EST
  DailyScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Trigger portfolio analysis daily at 2 PM EST"
      # Cron expression: 0 19 * * ? * (2 PM EST = 7 PM UTC during standard time, 6 PM UTC during daylight time)
      # Using 2 PM EST year-round (adjusting for daylight saving time manually)
      ScheduleExpression: "cron(0 19 * * ? *)"  # 2 PM EST (7 PM UTC)
      State: ENABLED
      Targets:
        - Arn: !GetAtt PortfolioAnalyzerFunction.Arn
          Id: "PortfolioAnalyzerTarget"

  # Permission for EventBridge to invoke Lambda
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PortfolioAnalyzerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyScheduleRule.Arn

  # CloudWatch Alarm for Lambda errors
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Portfolio Analyzer Lambda function errors"
      AlarmName: !Sub "${AWS::StackName}-lambda-errors"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: Errors
      Namespace: AWS/Lambda
      Period: 300
      Statistic: Sum
      Threshold: 0
      Dimensions:
        - Name: FunctionName
          Value: !Ref PortfolioAnalyzerFunction
      TreatMissingData: notBreaching

  # CloudWatch Alarm for Lambda duration
  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Portfolio Analyzer Lambda function duration"
      AlarmName: !Sub "${AWS::StackName}-lambda-duration"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 2
      MetricName: Duration
      Namespace: AWS/Lambda
      Period: 300
      Statistic: Average
      Threshold: 600000  # 10 minutes in milliseconds
      Dimensions:
        - Name: FunctionName
          Value: !Ref PortfolioAnalyzerFunction
      TreatMissingData: notBreaching

  # News alert Lambda function (same zip, separate handler + schedule)
  NewsAlertFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: portfolio-news-alert
      Runtime: python3.11
      Handler: lambda_function.news_alert_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      Timeout: 300   # 5 minutes — news fetching is faster than full portfolio analysis
      MemorySize: 256
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref PortfolioBucket
          DATA_PROVIDER: finnhub
      Description: 'Pre-market news alert digest'

  # CloudWatch Log Group for news alert
  NewsAlertLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${NewsAlertFunction}"
      RetentionInDays: 30

  # EventBridge rule: 7:30 AM ET weekdays (12:30 UTC = EST, shifts to 11:30 UTC during EDT)
  NewsAlertScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Trigger pre-market news alert at 7:30 AM ET on weekdays"
      ScheduleExpression: "cron(30 12 ? * MON-FRI *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt NewsAlertFunction.Arn
          Id: "NewsAlertTarget"

  # Permission for EventBridge to invoke news alert Lambda
  NewsAlertInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref NewsAlertFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt NewsAlertScheduleRule.Arn

  # Market Pulse digest Lambda (trends + congressional trades) — same zip, separate handler + schedule
  MarketDigestFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: portfolio-market-digest
      Runtime: python3.11
      Handler: lambda_function.market_digest_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      Timeout: 300   # 5 minutes — yfinance bar fetches + two JSON feeds
      MemorySize: 512
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref PortfolioBucket
          DATA_PROVIDER: yfinance
      Description: 'Daily Market Pulse digest (market trends + congressional trades)'

  # CloudWatch Log Group for Market Pulse
  MarketDigestLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${MarketDigestFunction}"
      RetentionInDays: 30

  # EventBridge rule: daily at 6:00 PM ET (23:00 UTC when ET is EST, 22:00 UTC when EDT)
  # Using 23:00 UTC year-round; during DST the digest will arrive at 7 PM ET instead.
  MarketDigestScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Trigger Market Pulse digest daily at 6 PM ET"
      ScheduleExpression: "cron(0 23 * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt MarketDigestFunction.Arn
          Id: "MarketDigestTarget"

  # Permission for EventBridge to invoke Market Pulse Lambda
  MarketDigestInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MarketDigestFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MarketDigestScheduleRule.Arn

Outputs:
  LambdaFunctionArn:
    Description: "Portfolio Analyzer Lambda Function ARN"
    Value: !GetAtt PortfolioAnalyzerFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-lambda-arn"

  NewsAlertFunctionArn:
    Description: "News Alert Lambda Function ARN"
    Value: !GetAtt NewsAlertFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-news-alert-lambda-arn"

  S3BucketName:
    Description: "S3 Bucket for portfolio data"
    Value: !Ref PortfolioBucket
    Export:
      Name: !Sub "${AWS::StackName}-s3-bucket"

  ApiKeysSecretArn:
    Description: "API Keys Secret ARN"
    Value: !Ref ApiKeysSecret
    Export:
      Name: !Sub "${AWS::StackName}-api-secret"

  EmailConfigSecretArn:
    Description: "Email Config Secret ARN"
    Value: !Ref EmailConfigSecret
    Export:
      Name: !Sub "${AWS::StackName}-email-secret"

  ScheduleRuleArn:
    Description: "Daily schedule rule ARN"
    Value: !GetAtt DailyScheduleRule.Arn

  NewsAlertScheduleRuleArn:
    Description: "News alert schedule rule ARN"
    Value: !GetAtt NewsAlertScheduleRule.Arn
    Export:
      Name: !Sub "${AWS::StackName}-schedule-rule"

  MarketDigestFunctionArn:
    Description: "Market Pulse Lambda Function ARN"
    Value: !GetAtt MarketDigestFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-market-digest-lambda-arn"

  MarketDigestScheduleRuleArn:
    Description: "Market Pulse schedule rule ARN"
    Value: !GetAtt MarketDigestScheduleRule.Arn
    Export:
      Name: !Sub "${AWS::StackName}-market-digest-schedule-rule"